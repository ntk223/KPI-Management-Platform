version: '3.8'

services:
  kpi-db:
    image: mysql:8.0
    container_name: kpi-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: kien@123
      MYSQL_DATABASE: kpi_management
    volumes:
      - mysql_prod_data:/var/lib/mysql
    restart: unless-stopped
    # Tối ưu hóa hiệu năng ghi đọc cho MySQL trong container
    command: --default-authentication-plugin=mysql_native_password

  kpi-cache:
    image: redis:7.0-alpine
    container_name: kpi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    # Chạy Redis với chế độ AOF (Append Only File) để ghi log dữ liệu liên tục xuống ổ đĩa,
    # giúp bảo vệ dữ liệu Refresh Token không bị mất khi container restart đột ngột.
    command: redis-server --appendonly yes
volumes:
  mysql_prod_data:
  redis_prod_data: