name: CI/CD Docker Pipeline

on:
  push:
    branches:
      - main # Kích hoạt khi có hành động push hoặc merge vào branch main

env:
  REGISTRY: ghcr.io
  # Chuyển tên repo về chữ thường vì Docker Registry không nhận chữ hoa
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Cần quyền này để push image lên GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Đăng nhập vào GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Token này GitHub tự sinh ra, không cần cấu hình thêm

      # Build và Push Docker Image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Chuyển tag về dạng chữ thường để tránh lỗi Docker tag
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Di chuyển vào thư mục chứa docker-compose trên VPS
            cd /var/www/my-app
            
            # Đăng nhập vào GHCR từ VPS bằng Token của Github Actions cấp tạm thời
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Kéo Image mới nhất về VPS
            docker compose pull
            
            # Khởi động lại Container với Image mới (giảm thiểu tối đa downtime)
            docker compose up -d --remove-orphans
            
            # Dọn dẹp các Docker image cũ/rác để tránh đầy ổ cứng VPS
            docker image prune -f